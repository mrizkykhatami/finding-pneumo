{% extends "base.html" %}
{% block title %}Registrasi &middot; FindingPneumo{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold tracking-tight">Registrasi Dokter</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Buat akun untuk mengakses sistem</p>
    </div>

    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-7">
      <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">

        <div>
          <label class="block text-sm font-medium mb-1.5">Nama Lengkap</label>
          <input type="text" name="nama" required autofocus
                 class="w-full px-3.5 py-2.5 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-clinic-500 focus:border-transparent transition"
                 placeholder="dr. Budi Santoso">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1.5">Email</label>
          <input type="email" name="email" required
                 class="w-full px-3.5 py-2.5 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-clinic-500 focus:border-transparent transition"
                 placeholder="dokter@rs.id">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1.5">Role</label>
          <select name="role" required
                  class="w-full px-3.5 py-2.5 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-clinic-500 focus:border-transparent transition">
            <option value="Dokter Umum">Dokter Umum</option>
            <option value="Radiolog">Radiolog</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1.5">Password</label>
          <input type="password" name="password" required minlength="6"
                 class="w-full px-3.5 py-2.5 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-clinic-500 focus:border-transparent transition"
                 placeholder="Minimal 6 karakter">
        </div>

        <button type="submit"
                class="w-full py-2.5 rounded-lg bg-clinic-600 hover:bg-clinic-700 text-white font-medium shadow-sm shadow-clinic-600/30 transition">
          Daftar
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-5">
      Sudah punya akun?
      <a href="{{ url_for('auth.login') }}" class="text-clinic-600 dark:text-clinic-400 font-medium hover:underline">Login</a>
    </p>
  </div>
</div>
{% endblock %}
