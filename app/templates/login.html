{% extends "base.html" %}
{% block title %}Login &middot; FindingPneumo{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold tracking-tight">Sign in to the System</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Doctor portal — AI pneumonia screening</p>
    </div>

    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-7">
      <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">

        <div>
          <label class="block text-sm font-medium mb-1.5">Email</label>
          <input type="email" name="email" required autofocus
                 class="w-full px-3.5 py-2.5 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-clinic-500 focus:border-transparent transition"
                 placeholder="doctor@hospital.com">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1.5">Password</label>
          <input type="password" name="password" required
                 class="w-full px-3.5 py-2.5 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-clinic-500 focus:border-transparent transition"
                 placeholder="••••••••">
        </div>

        <button type="submit"
                class="w-full py-2.5 rounded-lg bg-clinic-600 hover:bg-clinic-700 text-white font-medium shadow-sm shadow-clinic-600/30 transition">
          Login
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-5">
      No account yet?
      <a href="{{ url_for('auth.register') }}" class="text-clinic-600 dark:text-clinic-400 font-medium hover:underline">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
